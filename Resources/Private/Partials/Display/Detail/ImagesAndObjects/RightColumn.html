{namespace dla=Dla\DlaOpacNg\ViewHelpers}

<v:variable.set value="{s:data.valueForKey(array:document.fields, key:'personBy_id_mv')}" name="personBy_id_mv" />
<v:variable.set value="" name="person_query" />
<f:for each="{personBy_id_mv}" as="person" key="fieldName" iteration="iterator">
    <f:if condition="{person}">
        <f:if condition="{person_query}">
            <f:then>
                <v:variable.set value="{person_query} OR {person}" name="person_query" />
            </f:then>
            <f:else>
                <v:variable.set value="{person}" name="person_query" />
            </f:else>
        </f:if>
    </f:if>
</f:for>

<f:if condition="{person_query}">
    <dla:fromSolr
            query="personBy_id_mv:({person_query}) AND personBy_role_mv:(\"Urheber/in\") AND filterType_mv:(\"Bilder und Objekte\")"
            fields="id,display,filterType_mv"
            rows="5" />
    <f:if condition="{f:count(subject: solr)} > 0">
    <section class="ctg-facet right-col-similar-artist">
        <h3><a title="<f:translate key='schließen' extensionName='dla_opac_ng'/>"><span class="icon bel-pfeil-o01"></span></a>
            <f:translate key="Vom selben Künstler" extensionName="dla_opac_ng" />
        </h3>
        <ul>
            <f:for each="{solr}" as="solrResult">
                <li>
                    <f:link.action action="detail" arguments="{id:'{solrResult.id}'}" title="{solrResult.display}" class="internal">
                        <f:render partial="Display/Detail/MediatypeIcon" arguments="{filterType_mv:solrResult.filterType_mv, filterDigital:document.filterDigital}" />
                    </f:link.action>
                    <f:link.action action="detail" arguments="{id:'{solrResult.id}'}" title="{solrResult.display}" class="internal">
                        <f:format.crop maxCharacters="60" respectWordBoundaries="TRUE" respectHtml="TRUE">
                            {solrResult.display}
                        </f:format.crop>
                    </f:link.action>
                </li>
            </f:for>

            <f:if condition="{f:count(subject: solr)} > 0">
                <f:then>
                    <v:variable.set value="{s:data.valueForKey(array:document.fields, key:'id')}" name="id" />
                    <f:if condition="{solrResult.id}!={id}">
                        <li>
                            <f:link.action action="index" arguments="{q:{raw: 'personBy_id_mv:({person_query}) AND personBy_role_mv:(\"Urheber/in\") AND filterType_mv:(\"Bilder und Objekte\")'}}" title="{solr.display}" class="internal" additionalAttributes="{rel: 'nofollow'}">
                                <span class="icon bel-lupe"></span>
                            </f:link.action>
                            <f:link.action action="index" arguments="{q:{raw: 'personBy_id_mv:({person_query}) AND personBy_role_mv:(\"Urheber/in\") AND filterType_mv:(\"Bilder und Objekte\")'}}" title="{solr.display}" class="internal" additionalAttributes="{rel: 'nofollow'}">
                                <f:translate key="Alle anzeigen" extensionName="dla_opac_ng" />
                            </f:link.action>
                        </li>
                    </f:if>
                </f:then>
                <f:else>
                    <li>
                        <span class="icon"></span>
                        <f:translate key="Keine Treffer vorhanden" extensionName="dla_opac_ng" />
                    </li>
                    <f:format.raw>
                        <script type="text/javascript">
                            $(document).ready(function() {
                                $('.right-col-similar-artist').hide();
                            });
                        </script>
                    </f:format.raw>
                </f:else>
            </f:if>
        </ul>
    </section>
    </f:if>
</f:if>

<section class="ctg-facet right-col-similar-motive">
    <h3><a title="<f:translate key='schließen' extensionName='dla_opac_ng'/>"><span class="icon bel-pfeil-o01"></span></a>
        <f:translate key="Ähnliche Motive" extensionName="dla_opac_ng" />
    </h3>
    <ul>
        <v:variable.set value="{s:data.valueForKey(array:document.fields, key:'personAbout_id_mv')}" name="personAbout_id_mv" />
        <v:variable.set value="" name="personAbout_id_mv_query" />
        <f:for each="{personAbout_id_mv}" as="person" key="key" iteration="iterator">
            <f:if condition="{person}">
                <f:if condition="{personAbout_id_mv_query}">
                    <f:then>
                        <v:variable.set value="{personAbout_id_mv_query} OR {person}" name="personAbout_id_mv_query" />
                    </f:then>
                    <f:else>
                        <v:variable.set value="{person}" name="personAbout_id_mv_query" />
                    </f:else>
                </f:if>
            </f:if>
        </f:for>

        <v:variable.set value="{s:data.valueForKey(array:document.fields, key:'subject_id_mv')}" name="subject_id_mv" />
        <v:variable.set value="" name="subject_id_mv_query" />
        <f:for each="{subject_id_mv}" as="person" key="key" iteration="iterator">
            <f:if condition="{person}">
                <f:if condition="{subject_id_mv_query}">
                    <f:then>
                        <v:variable.set value="{subject_id_mv_query} OR {person}" name="subject_id_mv_query" />
                    </f:then>
                    <f:else>
                        <v:variable.set value="{person}" name="subject_id_mv_query" />
                    </f:else>
                </f:if>
            </f:if>
        </f:for>

        <v:variable.set value="{s:data.valueForKey(array:document.fields, key:'corporationAbout_id_mv')}" name="corporationAbout_id_mv" />
        <v:variable.set value="" name="corporationAbout_id_mv_query" />
        <f:for each="{corporationAbout_id_mv}" as="ks" key="key" iteration="iterator">
            <f:if condition="{ks}">
                <f:if condition="{corporationAbout_id_mv_query}">
                    <f:then>
                        <v:variable.set value="{corporationAbout_id_mv_query} OR {ks}" name="corporationAbout_id_mv_query" />
                    </f:then>
                    <f:else>
                        <v:variable.set value="{ks}" name="corporationAbout_id_mv_query" />
                    </f:else>
                </f:if>
            </f:if>
        </f:for>

        <v:variable.set value="{s:data.valueForKey(array:document.fields, key:'work_id_mv')}" name="work_id_mv" />
        <v:variable.set value="" name="work_id_mv_query" />
        <f:for each="{work_id_mv}" as="aky" key="key" iteration="iterator">
            <f:if condition="{aky}">
                <f:if condition="{work_id_mv_query}">
                    <f:then>
                        <v:variable.set value="{work_id_mv_query} OR {aky}" name="work_id_mv_query" />
                    </f:then>
                    <f:else>
                        <v:variable.set value="{aky}" name="work_id_mv_query" />
                    </f:else>
                </f:if>
            </f:if>
        </f:for>

        <v:variable.set value="(" name="query" />

        <f:if condition="{personAbout_id_mv_query}">
            <v:variable.set value="{query} personAbout_id_mv:({personAbout_id_mv_query})" name="query" />
        </f:if>

        <f:if condition="{subject_id_mv_query}">
            <v:variable.set value="{query} subject_id_mv:({subject_id_mv_query})" name="query" />
        </f:if>

        <f:if condition="{corporationAbout_id_mv_query}">
            <v:variable.set value="{query} corporationAbout_id_mv:({corporationAbout_id_mv_query})" name="query" />
        </f:if>

        <f:if condition="{work_id_mv_query}">
            <v:variable.set value="{query} work_id_mv:({work_id_mv_query})" name="query" />
        </f:if>
        <f:if condition="{personAbout_id_mv_query} || {subject_id_mv_query} || {corporationAbout_id_mv_query} || {work_id_mv_query}">
            <v:variable.set value="{query} ) AND filterType_mv:(\"Bilder und Objekte\")" name="query" />

            <dla:fromSolr
                query="{query}"
                fields="id,display,filterType_mv"
                rows="5" />
            <f:for each="{solr}" as="solrResult">
            <v:variable.set value="{s:data.valueForKey(array:document.fields, key:'id')}" name="id" />
            <f:if condition="{solrResult.id}!={id}">
                <f:then>
                    <li>
                        <f:link.action action="detail" arguments="{id:'{solrResult.id}'}" title="{solrResult.display}" class="internal">
                            <f:render partial="Display/Detail/MediatypeIcon" arguments="{filterType_mv:solrResult.filterType_mv, filterDigital:document.filterDigital}" />
                        </f:link.action>
                        <f:link.action action="detail" arguments="{id:'{solrResult.id}'}" title="{solrResult.display}" class="internal">
                            <f:format.crop maxCharacters="60" respectWordBoundaries="TRUE" respectHtml="TRUE">
                                {solrResult.display}
                            </f:format.crop>
                        </f:link.action>
                    </li>
                </f:then>
                <f:else>
                    <v:variable.set value="1" name="removeSameId" />
                </f:else>
            </f:if>
            </f:for>

            <f:if condition="{f:count(subject: solr)} > 0 && {removeSameId}!= 1 || {removeSameId}== 1 && {f:count(subject: solr)} > 1)">
            <f:then>
                <f:comment><li><a title=""><span class="icon bel-pfeil-u02"></span></a><a title="">weitere 6</a></li></f:comment>
                <li>
                    <f:link.action action="index" arguments="{q:{raw: '{query}'}}" title="{solr.display}" class="internal" additionalAttributes="{rel: 'nofollow'}">
                        <span class="icon bel-lupe"></span>
                    </f:link.action>
                    <f:link.action action="index" arguments="{q:{raw: '{query}'}}" title="{solr.display}" class="internal" additionalAttributes="{rel: 'nofollow'}">
                        <f:translate key="Alle anzeigen" extensionName="dla_opac_ng" />
                    </f:link.action>
                </li>
            </f:then>
            <f:else>
                <li>
                    <span class="icon"></span>
                    <f:translate key="Keine Treffer vorhanden" extensionName="dla_opac_ng" />
                </li>
                <f:format.raw>
                    <script type="text/javascript">
                        $(document).ready(function() {
                            $('.right-col-similar-motive').hide();
                        });
                    </script>
                </f:format.raw>
            </f:else>
            </f:if>
        </f:if>
    </ul>
</section>

<f:render partial="Display/Detail/RightColumn/BestandsbildnerRightColumn" arguments="{_all}"/>
