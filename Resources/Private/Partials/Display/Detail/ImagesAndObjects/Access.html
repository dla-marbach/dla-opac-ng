{namespace dla=Dla\DlaOpacNg\ViewHelpers}
<f:if condition="!{iterator.index}">
    <v:variable.set value="{index: '0'}" name="iterator" />
</f:if>
<div class="ctg-dtvt-row row-{item_id_mv.{iterator.index}} aukey-row-info">

    <v:variable.set value="{s:data.valueForKey(array:document.fields, key:'usageRestriction')}" name="usageRestriction" />

    <f:if condition="{usageRestriction}=='nicht benutzbar' || {filterType_mv.0}=='Daten'">
        <f:then>
            <div style="padding: 0.5rem 0; margin-bottom: 10px;">
                <span class="ctg-button" style="background-color: #dadada;color: #747474;padding-bottom: 10px;padding-left: 6px;padding-right: 6px;padding-top:10px;">
                    <f:translate key="Nicht bestellbar" extensionName="dla_opac_ng"/>
                </span>
                <span class="icon bel-kreis02" style="color:#cf2a0e;margin-left: 3px;"></span>
            </div>
        </f:then>
        <f:else>
            <v:variable.set value="{s:data.valueForKey(array:document.fields, key:'usageRestrictionNote')}" name="usageRestrictionNote" />
            <f:if condition="{usageRestrictionNote}">
                <f:then>
                    <dla:replaceBreaks text="{usageRestrictionNote}" as="restriction"/>

                    <f:if condition="{v:format.substring(content: '{restriction}', start: 0, length: 17)}=='bedingt benutzbar'">
                        <f:then>
                            <div style="padding: 0.5rem 0; margin-bottom: 10px;">

                                <f:render partial="Display/Detail/Order/OrderLink" arguments="{_all}"/>

                                <span class="icon bel-kreis02" style="color:#df661e;"></span>
                            </div>
                        </f:then>
                        <f:else>
                            <div style="padding: 0.5rem 0; margin-bottom: 10px;">

                                <f:render partial="Display/Detail/Order/OrderLink" arguments="{_all}"/>

                                <span class="icon bel-kreis02" style="color:#00df27;"></span>
                            </div>
                        </f:else>
                    </f:if>
                </f:then>
                <f:else>
                    <div style="padding: 0.5rem 0; margin-bottom: 10px;">

                        <f:render partial="Display/Detail/Order/OrderLink" arguments="{_all}"/>

                        <span class="icon bel-kreis02" style="color:#00df27;"></span>
                    </div>
                </f:else>
            </f:if>
        </f:else>
    </f:if>
    <div class="ctg-dtvt-content">
    </div>
    <div class="ctg-dtvt">
    </div>
</div>
<div id="{iterator.cycle}" class="ctg-dtvt-row">

    <div class="">

        <v:variable.set value="{s:data.valueForKey(array:document.fields, key:'usageRestrictionNote')}" name="usageRestrictionNote" />

        <f:if condition="{usageRestrictionNote}">
            <f:then>
                <div class="ctg-dtvt-row">
                    <div class="ctg-dtvt-label">
                        <f:translate key="Benutzungshinweis" extensionName="dla_opac_ng"/>
                    </div>

                    <div class="ctg-dtvt-content">
                        <dla:replaceBreaks text="{usageRestrictionNote}" as="usageRestrictionNote" />
                        <f:format.raw>{usageRestrictionNote}</f:format.raw>
                    </div>
                </div>
            </f:then>
        </f:if>

        <v:variable.set value="{s:data.valueForKey(array:document.fields, key:'digitalObject_hyperlink_mv')}" name="digitalObject_hyperlink_mv" />
        <v:variable.set value="{s:data.valueForKey(array:document.fields, key:'category')}" name="category" />
        <f:if condition="{digitalObject_hyperlink_mv}">
            <div class="ctg-dtvt-row">
                <div class="ctg-dtvt-label">
                    <f:if condition="{category}=='Konvolut' || {dla:stringContains(input: digitalObject_hyperlink_mv, search: 'dbst02')}">
                        <f:then>
                            <f:translate key='Inhalt' extensionName='dla_opac_ng'/>
                        </f:then>
                        <f:else>
                            <f:translate key='Digitales Objekt' extensionName='dla_opac_ng'/>
                        </f:else>
                    </f:if>
                </div>
                <div class="ctg-dtvt-content">
                    <f:render partial="MediaAccess/RenderLinks" arguments="{_all}"/>
                </div>
            </div>
        </f:if>

    </div>
</div>
