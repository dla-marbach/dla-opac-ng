{namespace dla=Dla\DlaOpacNg\ViewHelpers}
<v:variable.set value="{s:data.valueForKey(array:document.fields, key:'title')}" name="title" />

<section>

    <v:variable.set value="{s:data.valueForKey(array:document.fields, key:'linkCommonsImage_file_mv')}" name="linkCommonsImage_file_mv" />
    <v:variable.set value="{s:data.valueForKey(array:document.fields, key:'linkCommonsImage_rights_mv')}" name="linkCommonsImage_rights_mv" />
    <f:if condition="{linkCommonsImage_file_mv}">
        <figure class="teaser ctg-media-teaser">
            <img src="https://commons.wikimedia.org/wiki/Special:FilePath/{linkCommonsImage_file_mv.0}?width=270px" style="width: 100%; height: auto;" />
            <div class="ctg-media-content">
                <span class="icon bel-info"></span>
                <p><f:format.raw>{linkCommonsImage_rights_mv.0}</f:format.raw></p>
            </div>
        </figure>
    </f:if>
</section>

<v:variable.set value="{s:data.valueForKey(array:document.fields, key:'id')}" name="id" />
<v:variable.set value="{s:data.valueForKey(array:document.fields, key:'display')}" name="display" />
<s:data.newArray
        name="query"
        global="1"
        keys="{0:'detail_ks_rightcolumn'}"
        values="{0:'{id}'}"
/>
<dla:solveQuery array="{query}" as="solvedQuery" settings="{settings}" />
<dla:countFromSolr query="{solvedQuery}" />

<f:if condition="{solrcount}>0">
    <section class="ctg-facet">
        <h3><a title="schließen" class="button-close"><span class="icon bel-pfeil-o01"></span></a><f:translate key="detail.document_link" extensionName="dla_opac_ng"/></h3>
        <ul>
            <li>
                <f:link.action action="index" arguments="{q:query}" class="internal" additionalAttributes="{rel: 'nofollow'}">
                    <span class="icon bel-idkarte"></span>
                </f:link.action>
                <f:link.action action="index" arguments="{q:query}" class="internal" additionalAttributes="{rel: 'nofollow'}">
                    Werke ({solrcount})
                </f:link.action>
            </li>
        </ul>
    </section>
</f:if>

<section class="ctg-facet-other">
    <v:variable.set value="{s:data.valueForKey(array:document.fields, key:'linkWikidataWebsite_mv')}" name="linkWikidataWebsite_mv" />
    <v:variable.set value="{s:data.valueForKey(array:document.fields, key:'linkWikipedia')}" name="linkWikipedia" />
    <v:variable.set value="{s:data.valueForKey(array:document.fields, key:'linkWikidata')}" name="linkWikidata" />

    <h3><f:translate key="Andere Fundorte" extensionName="dla_opac_ng"/> <a title="schließen" class="button-close"><span class="icon bel-pfeil-o01"></span></a></h3>
    <ul>
        <f:if condition="{linkWikidataWebsite_mv}">
            <f:for each="{linkWikidataWebsite_mv}" as="item" key="key" iteration="iterator">
                <li>
                    <a href="{item}" target="_blank"><span class="icon bel-link03"></span></a>
                    <a href="{item}" target="_blank">Webseite</a>
                </li>
            </f:for>
        </f:if>
        <f:if condition="{linkWikipedia}">
            <li>
                <a href="{linkWikipedia}" target="_blank"><span class="icon bel-link03"></span></a>
                <a href="{linkWikipedia}" target="_blank">Wikipedia</a>
            </li>
        </f:if>

        <v:variable.set value="{s:data.valueForKey(array:document.fields, key:'gnd_id_mv')}" name="gnd_id_mv" />
        <f:for each="{gnd_id_mv}" as="item" key="key" iteration="iterator">
            <f:if condition="{item}">
                <li>
                    <a href="http://d-nb.info/gnd/{item}" target="_blank">
                        <span class="icon bel-link03"></span>
                    </a>
                    <a href="http://d-nb.info/gnd/{item}" target="_blank">
                        GND
                    </a>
                </li>
            </f:if>
        </f:for>

        <f:if condition="{linkWikidata}">
            <li>
                <a href="https://www.wikidata.org/wiki/{linkWikidata}" target="_blank"><span class="icon bel-link03"></span></a>
                <a href="https://www.wikidata.org/wiki/{linkWikidata}" target="_blank">Wikidata</a>
            </li>
        </f:if>
    </ul>
</section>

<f:comment>
<section class="ctg-facet">
    <h3><a title="<f:translate key='schließen' extensionName='dla_opac_ng'/>"><span class="icon bel-pfeil-o01"></span></a>
        Vom selben Künstler
    </h3>
    <ul>
        <v:variable.set value="{s:data.valueForKey(array:document.fields, key:'personBy_id_mv')}" name="personBy_id_mv" />
        <v:variable.set value="" name="person_query" />
        <f:for each="{personBy_id_mv}" as="person" key="fieldName" iteration="iterator">
            <f:if condition="{person}">
                <f:if condition="{person_query}">
                    <f:then>
                        <v:variable.set value="{person_query} OR {person}" name="person_query" />
                    </f:then>
                    <f:else>
                        <v:variable.set value="{person}" name="person_query" />
                    </f:else>
                </f:if>
            </f:if>
        </f:for>

        <f:if condition="{person_query}">
            <dla:fromSolr
                    query="personBy_id_mv:({person_query}) AND personBy_role_mv:(Urheber/in) AND filterType_mv:(Bilder und Objekte)"
                    fields="id,display,filterType_mv"
                    rows="5" />
            <f:for each="{solr}" as="solrResult">
            <v:variable.set value="{s:data.valueForKey(array:document.fields, key:'id')}" name="id" />
            <f:if condition="{solrResult.id}!={id}">
                <f:then>
                    <li>
                        <f:link.action action="detail" arguments="{id:'{solrResult.id}'}" title="{solrResult.display}" class="internal">
                            <span class="icon bel-mag"></span>
                        </f:link.action>
                        <f:link.action action="detail" arguments="{id:'{solrResult.id}'}" title="{solrResult.display}" class="internal">
                            <f:format.crop maxCharacters="60" respectWordBoundaries="TRUE" respectHtml="TRUE">
                                {solrResult.display}
                            </f:format.crop>
                        </f:link.action>
                    </li>
                </f:then>
                <f:else>
                    <v:variable.set value="1" name="removeSameId" />
                </f:else>
            </f:if>
            </f:for>

            <f:if condition="{f:count(subject: solr)} > 0 && {removeSameId}!= 1 || {removeSameId}== 1 && {f:count(subject: solr)} > 1)">
            <f:then>
                <f:comment><li><a title=""><span class="icon bel-pfeil-u02"></span></a><a title="">weitere 6</a></li></f:comment>
                <li>
                    <f:link.action action="index" arguments="{q:{raw: 'personBy_id_mv:({person_query}) AND personBy_role_mv:(Urheber/in) AND filterType_mv:(Bilder und Objekte)'}}" title="{solr.display}" class="internal" additionalAttributes="{rel: 'nofollow'}">
                        <span class="icon bel-lupe"></span>
                    </f:link.action>
                    <f:link.action action="index" arguments="{q:{raw: 'personBy_id_mv:({person_query}) AND personBy_role_mv:(Urheber/in) AND filterType_mv:(Bilder und Objekte)'}}" title="{solr.display}" class="internal" additionalAttributes="{rel: 'nofollow'}">
                        <f:translate key="Alle anzeigen" extensionName="dla_opac_ng" />
                    </f:link.action>
                </li>
            </f:then>
            <f:else>
                <li>
                    <span class="icon"></span>
                    <f:translate key="Keine Treffer vorhanden" extensionName="dla_opac_ng" />
                </li>
            </f:else>
            </f:if>
        </f:if>
    </ul>
</section>

<section class="ctg-facet">
    <h3><a title="<f:translate key='schließen' extensionName='dla_opac_ng'/>"><span class="icon bel-pfeil-o01"></span></a>
        Ähnliche Motive
    </h3>
    <ul>
        <v:variable.set value="{s:data.valueForKey(array:document.fields, key:'personBy_id_mv')}" name="personBy_id_mv" />
        <v:variable.set value="" name="personBy_id_mv_query" />
        <f:for each="{personBy_id_mv}" as="person" key="key" iteration="iterator">
            <f:if condition="{iterator.isFirst}">
                <f:then>
                    <v:variable.set value="{person}" name="personBy_id_mv_query" />
                </f:then>
                <f:else>
                    <v:variable.set value="{personBy_id_mv_query} OR {person}" name="personBy_id_mv_query" />
                </f:else>
            </f:if>
        </f:for>

        <dla:fromSolr
                query="(personBy_id_mv:({personBy_id_mv_query}) OR corporationAbout_id_mv:({personBy_id_mv_query}) OR subjectLocation_id_mv:({subjectLocation_id_mv_query}) OR work_id_mv:({personBy_id_mv_query})) AND filterType_mv:(Bilder und Objekte)"
                fields="id,display,filterType_mv"
                rows="5" />
        <f:for each="{solr}" as="solrResult">
            <v:variable.set value="{s:data.valueForKey(array:document.fields, key:'id')}" name="id" />
            <f:if condition="{solrResult.id}!={id}">
                <f:then>
                    <li>
                        <f:link.action action="detail" arguments="{id:'{solrResult.id}'}" title="{solrResult.display}" class="internal">
                            <span class="icon bel-mag"></span>
                        </f:link.action>
                        <f:link.action action="detail" arguments="{id:'{solrResult.id}'}" title="{solrResult.display}" class="internal">
                            <f:format.crop maxCharacters="60" respectWordBoundaries="TRUE" respectHtml="TRUE">
                                {solrResult.display}
                            </f:format.crop>
                        </f:link.action>
                    </li>
                </f:then>
                <f:else>
                    <v:variable.set value="1" name="removeSameId" />
                </f:else>
            </f:if>
        </f:for>

        <f:if condition="{f:count(subject: solr)} > 0 && {removeSameId}!= 1 || {removeSameId}== 1 && {f:count(subject: solr)} > 1)">
            <f:then>
                <f:comment><li><a title=""><span class="icon bel-pfeil-u02"></span></a><a title="">weitere 6</a></li></f:comment>
                <li>
                    <f:link.action action="index" arguments="{q:{raw: '(personBy_id_mv:{personBy_id_mv_query} OR corporationAbout_id_mv:{personBy_id_mv_query} OR subjectLocation_id_mv:({personBy_id_mv_query}) OR work_id_mv:({personBy_id_mv_query})) AND filterType_mv:(Bilder und Objekte)'}}" title="{solr.display}" class="internal" additionalAttributes="{rel: 'nofollow'}">
                        <span class="icon bel-lupe"></span>
                    </f:link.action>
                    <f:link.action action="index" arguments="{q:{raw: '(personBy_id_mv:{personBy_id_mv_query} OR corporationAbout_id_mv:{personBy_id_mv_query} OR subjectLocation_id_mv:({personBy_id_mv_query}) OR work_id_mv:({personBy_id_mv_query})) AND filterType_mv:(Bilder und Objekte)'}}" title="{solr.display}" class="internal" additionalAttributes="{rel: 'nofollow'}">
                        <f:translate key="Alle anzeigen" extensionName="dla_opac_ng" />
                    </f:link.action>
                </li>
            </f:then>
            <f:else>
                <li>
                    <span class="icon"></span>
                    <f:translate key="Keine Treffer vorhanden" extensionName="dla_opac_ng" />
                </li>
            </f:else>
        </f:if>
    </ul>
</section>

</f:comment>
